<!DOCTYPE html>
<html>
    <head>
        <title> Login</title>
        <meta charset="utf-8">
        <link rel="icon" type="image/png" href="../imgs/plane-icon.png">
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/login.js" defer></script>
        <script src="../js/header.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                renderHeader('login');
            });
        </script>
    </head>
    <body>
        <div id="header"></div>
        <main>
        <p>Please enter your username and password to continue.</p>

        <form method="post" action="/" id="login_form">
            <label for="username_input">Username:</label>
            <input type="text" id="username_input" name="username_input" placeholder="Please enter your username...">

            <label for="password_input">Password:</label>
            <input type="password" id="password_input" name="password_input" placeholder="Please enter your password...">

            <button id="login_btn" type="submit">Log in</button>
        </form>
        </main>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title> Traveller 21 </title>
        <meta charset="utf-8">
        <link rel="icon" type="image/png" href="../imgs/plane-icon.png">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="../js/header.js" defer></script>
        <script src="../js/my_posts.js" defer></script>
        <script src="../js/main.js" defer></script>
    </head>
    <body data-page="my_posts">
        <div id="header"></div>

        <main>
            <section>
                <h2>Share your thoughts</h2>
                <p>Get chatting with other travellers!</p>

                <form action="/makepost" method="post" id="postForm" name="postForm">
                    <fieldset>
                        <legend>Compose a Post</legend>
                            <label for="title_field">Post Title:</label>
                            <input id="title_field" name="title_field" type="text" placeholder="Title" maxlength="120" required>

                            <label for="content_field">Post Content:</label>
                            <textarea id="content_field" name="content_field" placeholder="Write your thoughts here.." maxlength="5000" required></textarea>
                            <!-- <input id="content_field" name="content_field" type="text"> -->

                            <input id="postId" name="postId" type="hidden">
                            
                            <button type="submit" id="post_button">Post</button>
                    </fieldset>
                </form>
            </section>

            <section id="myPosts">
                <h2>Your Posts</h2>
                <p>See all the posts you've made so far.</p>

                <i class="fa fa-search" aria-hidden="true"></i>
                <input class="search_bar" id="search" name="search" type="text" placeholder="Search your posts...">
            </section>
        </main>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title> Traveller 21 </title>
        <meta charset="utf-8">
        <link rel="icon" type="image/png" href="../imgs/plane-icon.png">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="../js/posts.js" defer></script>
        <script src="../js/main.js" defer></script>
    </head>
    <body>
        <div id="header"></div>
        <script src="../js/header.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                renderHeader('posts');
            });
        </script>

        <main>
            <section id="postsList">
                <h2>Latest Travel Posts</h2>
                <p>See the latest posts from other travellers!</p>

                <i class="fa fa-search" aria-hidden="true"></i>
                <input class="search_bar" id="search" name="search" type="text" placeholder="Search posts...">
            </section>
        </main>
    </body>
</html>
